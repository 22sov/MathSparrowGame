<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Воробей-математик</title>
    
    <!-- Мета-теги для Telegram Mini App -->
    <meta name="telegram:mini-app" content="true">
    <meta name="telegram:mini-app-url" content="https://ваш-username.github.io/воробей-математик/">
    
    <!-- Основные стили -->
    <style>
        /* ... все стили остаются без изменений ... */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a3a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            touch-action: manipulation;
            overflow: hidden;
        }
        .game-wrapper {
            background: #7ec8e0;
            border-radius: 36px;
            padding: 16px 16px 12px 16px;
            box-shadow: 0 16px 32px rgba(0,0,0,0.5);
            max-width: 420px;
            width: 100%;
            position: relative;
        }
        .canvas-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 0 2px #e8f8ff, 0 8px 12px rgba(0,0,0,0.3);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 400 / 480;
            touch-action: none;
            cursor: pointer;
        }
        .example-area {
            background: #1e3a44;
            padding: 12px 16px 10px 16px;
            border-radius: 0 0 24px 24px;
            margin-top: -4px;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.2);
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.3s ease;
        }
        .example-area.paused {
            opacity: 0.3;
            pointer-events: none;
        }
        .example-text {
            color: #f5f0d7;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            min-height: 2.4rem;
        }
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 4px 6px 4px;
            color: #0c1f2b;
            font-weight: bold;
            font-size: 1.1rem;
            text-shadow: 0 1px 2px rgba(255,255,240,0.6);
        }
        .life-badge {
            background: #2f5a6b;
            padding: 4px 16px;
            border-radius: 40px;
            color: #f5ffe0;
            box-shadow: inset 0 -2px 0 #142d38;
        }
        .restart-btn {
            background: #d98c5f;
            border: none;
            color: #1f2e33;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            border-radius: 40px;
            box-shadow: 0 4px 0 #7a4d2e;
            transition: all 0.05s ease;
            touch-action: manipulation;
            cursor: pointer;
        }
        .restart-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #7a4d2e;
        }
        .pause-btn {
            background: rgba(255, 245, 200, 0.6);
            border: none;
            color: #1f3d47;
            font-size: 1.3rem;
            padding: 2px 12px;
            border-radius: 30px;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.1s ease;
            line-height: 1.6;
        }
        .pause-btn:active {
            transform: scale(0.9);
        }
        .round-badge {
            color: #1f3d47;
            font-size: 0.9rem;
            padding: 2px 12px;
            background: rgba(255, 245, 200, 0.5);
            border-radius: 30px;
        }
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backdrop-filter: blur(4px);
            transition: opacity 0.5s ease;
            gap: 12px;
        }
        .play-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .game-title {
            color: #f5f0d7;
            font-size: 2.2rem;
            font-weight: 900;
            text-align: center;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5), 0 0 20px rgba(255,215,0,0.3);
            letter-spacing: 3px;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            line-height: 1.2;
            padding: 0 16px;
        }
        .game-title span {
            display: block;
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 4px;
            letter-spacing: 6px;
        }
        .play-btn {
            background: linear-gradient(145deg, #f7d94e, #f0b830);
            border: none;
            border-radius: 60px;
            padding: 18px 48px;
            font-size: 2rem;
            font-weight: 800;
            color: #1f2e33;
            box-shadow: none;
            cursor: pointer;
            transition: all 0.1s ease;
            touch-action: manipulation;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(255,255,200,0.3);
        }
        .play-btn:active {
            transform: scale(0.95);
        }
        .play-btn:hover {
            transform: scale(1.02);
        }
        .creator-credit {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 1px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
            margin-top: 4px;
        }
        @media (max-width: 440px) {
            .game-wrapper { padding: 10px; }
            .example-text { font-size: 1.3rem; }
            .info-panel { font-size: 1rem; }
            .play-btn { font-size: 1.5rem; padding: 14px 32px; }
            .game-title { font-size: 1.6rem; }
            .game-title span { font-size: 0.8rem; }
            .creator-credit { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="info-panel">
        <span class="life-badge" id="lifeDisplay">❤️ 10</span>
        <span class="round-badge" id="roundDisplay">Раунд 1</span>
        <button class="pause-btn" id="pauseBtn">⏸️</button>
        <button class="restart-btn" id="restartBtn">↺</button>
    </div>
    <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="gameCanvas" width="400" height="480"></canvas>
        <div class="play-overlay" id="playOverlay">
            <div class="game-title">
                ВОРОБЕЙ-МАТЕМАТИК
                <span>ШАРЫ И СЧИТАЙ</span>
            </div>
            <button class="play-btn" id="playBtn">ИГРАТЬ</button>
            <div class="creator-credit">Created by Tudvasov</div>
        </div>
    </div>
    <div class="example-area" id="exampleArea">
        <div class="example-text" id="exampleText">⏳ Ожидание примера...</div>
    </div>
</div>

<!-- Подключение Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
    (function(){
        // Инициализация Telegram WebApp
        let tg = null;
        try {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand(); // Разворачивает на весь экран
            console.log('Telegram WebApp initialized');
        } catch(e) {
            console.log('Not running in Telegram');
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const lifeSpan = document.getElementById('lifeDisplay');
        const roundDisplay = document.getElementById('roundDisplay');
        const exampleText = document.getElementById('exampleText');
        const exampleArea = document.getElementById('exampleArea');
        const playOverlay = document.getElementById('playOverlay');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        const W = 400, H = 480;
        const GROUND_Y = 440;
        const SPARROW_SIZE = 28;

        let gameActive = false;
        let gameCompleted = false;
        let gameStarted = false;
        let gamePaused = false;
        let life = 10;
        let sparrowY = 240;
        let velocity = 0;
        
        let round = 1;
        let examplesInRound = 0;
        const EXAMPLES_PER_ROUND = 10;
        
        const BASE_GRAVITY = 0.0875;
        let currentGravity = BASE_GRAVITY;
        const JUMP_HEIGHT = 80;
        
        let minNumber = 0;
        let maxNumber = 20;
        let wrongPenalty = 0;

        let currentExample = null;
        let phase = 'idle';
        let timeSinceLastExample = 0;
        let nextExampleTime = 1.5;
        let countdownValue = 0;

        let balloons = [];
        const BALLOON_SPEED = 1.8;

        let particles = [];
        let wingAngle = 0;

        let clouds = [];
        for (let i = 0; i < 6; i++) {
            clouds.push({
                x: Math.random() * W,
                y: 20 + Math.random() * 120,
                w: 60 + Math.random() * 80,
                h: 20 + Math.random() * 20,
                speed: 0.1 + Math.random() * 0.2,
                opacity: 0.2 + Math.random() * 0.3
            });
        }

        let shadowX = 120;

        let flashEffect = {
            active: false,
            type: '',
            alpha: 0,
            timer: 0
        };

        const BALLOON_COLORS = [
            { main: '#e74c3c', light: '#ff6b6b', dark: '#c0392b', string: '#7f8c8d' },
            { main: '#3498db', light: '#5dade2', dark: '#2471a3', string: '#7f8c8d' },
            { main: '#2ecc71', light: '#58d68d', dark: '#1e8449', string: '#7f8c8d' },
            { main: '#f39c12', light: '#f5b041', dark: '#d4ac0d', string: '#7f8c8d' },
            { main: '#9b59b6', light: '#af7ac5', dark: '#7d3c98', string: '#7f8c8d' },
            { main: '#1abc9c', light: '#48c9b0', dark: '#148f77', string: '#7f8c8d' }
        ];

        let lastTimestamp = 0;
        let deltaAccumulator = 0;
        const FIXED_DELTA = 1/60;

        const restartBtn = document.getElementById('restartBtn');

        function setupRound(roundNum) {
            round = roundNum;
            examplesInRound = 0;
            
            if (round === 1) {
                currentGravity = BASE_GRAVITY;
                minNumber = 0;
                maxNumber = 20;
                wrongPenalty = 0;
                roundDisplay.innerText = 'Раунд 1';
            } else if (round === 2) {
                currentGravity = 0.12;
                minNumber = 10;
                maxNumber = 40;
                wrongPenalty = 1;
                roundDisplay.innerText = 'Раунд 2';
            } else if (round === 3) {
                currentGravity = 0.18;
                minNumber = 30;
                maxNumber = 99;
                wrongPenalty = 2;
                roundDisplay.innerText = 'Раунд 3';
            }
            
            currentExample = null;
            phase = 'idle';
            timeSinceLastExample = 0;
            nextExampleTime = 1.5;
            countdownValue = 0;
            exampleText.innerText = '⏳ Ожидание примера...';
            
            balloons = [];
            particles = [];
            flashEffect.active = false;
            shadowX = 120;
        }

        function resetGame() {
            gameActive = false;
            gameCompleted = false;
            gameStarted = false;
            gamePaused = false;
            pauseBtn.innerText = '⏸️';
            exampleArea.classList.remove('paused');
            life = 10;
            sparrowY = 240;
            velocity = 0;
            deltaAccumulator = 0;
            balloons = [];
            particles = [];
            wingAngle = 0;
            flashEffect.active = false;
            shadowX = 120;
            setupRound(1);
            updateLifeDisplay();
            exampleText.innerText = '⏳ Ожидание примера...';
            playOverlay.classList.remove('hidden');
            
            // Обновляем Telegram WebApp при рестарте
            if (tg) {
                try {
                    tg.sendData(JSON.stringify({
                        event: 'restart',
                        score: 0
                    }));
                } catch(e) {}
            }
        }

        function startGame() {
            gameActive = true;
            gameStarted = true;
            gameCompleted = false;
            gamePaused = false;
            pauseBtn.innerText = '⏸️';
            exampleArea.classList.remove('paused');
            life = 10;
            sparrowY = 240;
            velocity = 0;
            balloons = [];
            particles = [];
            wingAngle = 0;
            flashEffect.active = false;
            shadowX = 120;
            setupRound(1);
            updateLifeDisplay();
            exampleText.innerText = '⏳ Ожидание примера...';
            playOverlay.classList.add('hidden');
            lastTimestamp = 0;
            deltaAccumulator = 0;
            
            // Обновляем Telegram WebApp
            if (tg) {
                try {
                    tg.sendData(JSON.stringify({
                        event: 'start',
                        score: 0
                    }));
                } catch(e) {}
            }
        }

        function togglePause() {
            if (!gameActive || gameCompleted) return;
            gamePaused = !gamePaused;
            pauseBtn.innerText = gamePaused ? '▶️' : '⏸️';
            
            if (gamePaused) {
                exampleArea.classList.add('paused');
                exampleText.innerText = '⏸️ ПАУЗА';
            } else {
                exampleArea.classList.remove('paused');
                if (currentExample && phase === 'showing') {
                    exampleText.innerText = currentExample.text;
                } else if (phase === 'waiting') {
                    const remaining = Math.ceil(nextExampleTime - timeSinceLastExample);
                    if (remaining > 0 && remaining <= 3) {
                        exampleText.innerText = `⏳ Следующий пример через ${remaining}...`;
                    } else {
                        exampleText.innerText = '⏳ Следующий пример через...';
                    }
                } else {
                    exampleText.innerText = '⏳ Ожидание примера...';
                }
                lastTimestamp = 0;
            }
        }

        function generateExample() {
            let a, b, isAdd, correct, text;
            const minVal = minNumber;
            const maxVal = maxNumber;
            
            isAdd = Math.random() < 0.5;
            if (isAdd) {
                a = Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
                b = Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
                while (a + b > maxVal) {
                    a = Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
                    b = Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
                }
                correct = a + b;
                text = `${a} + ${b} = ?`;
            } else {
                a = Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
                b = Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
                while (a - b < 0 || a > maxVal || b > maxVal) {
                    a = Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
                    b = Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
                }
                correct = a - b;
                text = `${a} – ${b} = ?`;
            }

            let options = new Set();
            options.add(correct);
            let attempts = 0;
            while (options.size < 3 && attempts < 1000) {
                let offset = Math.floor(Math.random() * 11) - 5;
                let fake = correct + offset;
                if (fake < minVal) fake = Math.floor(Math.random() * 10) + minVal;
                if (fake > maxVal) fake = maxVal - Math.floor(Math.random() * 10);
                if (fake !== correct && fake >= minVal && fake <= maxVal) {
                    options.add(fake);
                }
                attempts++;
                if (attempts > 500) {
                    let fallback = [correct+1, correct-1, correct+2, correct-2];
                    for (let v of fallback) {
                        if (v >= minVal && v <= maxVal && v !== correct && options.size < 3) {
                            options.add(v);
                        }
                    }
                    break;
                }
            }
            while (options.size < 3) {
                let extra = Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
                if (!options.has(extra)) options.add(extra);
            }

            let optArr = Array.from(options);
            for (let i = optArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [optArr[i], optArr[j]] = [optArr[j], optArr[i]];
            }

            return {
                text: text,
                correct: correct,
                options: optArr
            };
        }

        function spawnExample() {
            if (!gameActive || gameCompleted || gamePaused) return;
            currentExample = generateExample();
            phase = 'showing';
            countdownValue = 0;
            
            balloons = [];
            const colors = BALLOON_COLORS.slice(0, 3);
            
            for (let i = colors.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [colors[i], colors[j]] = [colors[j], colors[i]];
            }
            
            const startX = W + 30;
            
            const yPositions = [40, 195, 350];
            
            const shuffledPositions = [...yPositions];
            for (let i = shuffledPositions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledPositions[i], shuffledPositions[j]] = [shuffledPositions[j], shuffledPositions[i]];
            }
            
            for (let i = 0; i < 3; i++) {
                balloons.push({
                    x: startX,
                    y: shuffledPositions[i] + (Math.random() - 0.5) * 15,
                    value: currentExample.options[i],
                    isCorrect: currentExample.options[i] === currentExample.correct,
                    radius: 32,
                    color: colors[i % colors.length],
                    stringLength: 50,
                    swingPhase: Math.random() * Math.PI * 2,
                    scale: 1
                });
            }
            
            exampleText.innerText = currentExample.text;
        }

        function handleBalloonCollision(balloon) {
            if (!gameActive || !currentExample || phase !== 'showing' || gameCompleted || gamePaused) return;

            const isCorrect = balloon.isCorrect;
            
            flashEffect.active = true;
            flashEffect.type = isCorrect ? 'correct' : 'wrong';
            flashEffect.alpha = 1.0;
            flashEffect.timer = 0;

            createBalloonPop(balloon.x, balloon.y, balloon.color.main);

            if (isCorrect) {
                life = Math.min(life + 5, 99);
                updateLifeDisplay();
                exampleText.innerText = '✅ Верно! +5 очков';
                
                // Отправляем событие в Telegram
                if (tg) {
                    try {
                        tg.sendData(JSON.stringify({
                            event: 'correct',
                            life: Math.floor(life),
                            round: round
                        }));
                    } catch(e) {}
                }
            } else {
                life = Math.max(0, life - wrongPenalty);
                updateLifeDisplay();
                if (wrongPenalty > 0) {
                    exampleText.innerText = `❌ Неверно! -${wrongPenalty} сердечка`;
                } else {
                    exampleText.innerText = '❌ Неверно';
                }
                if (life <= 0) {
                    gameActive = false;
                    
                    // Отправляем событие окончания игры в Telegram
                    if (tg) {
                        try {
                            tg.sendData(JSON.stringify({
                                event: 'game_over',
                                life: 0,
                                round: round,
                                score: Math.floor(life)
                            }));
                        } catch(e) {}
                    }
                    return;
                }
            }

            balloons = [];
            examplesInRound++;
            
            if (examplesInRound >= EXAMPLES_PER_ROUND) {
                if (round === 3) {
                    gameCompleted = true;
                    gameActive = false;
                    exampleText.innerText = '🏆 Ты настоящий Эйнштейн и Джек Воробей! 🏆';
                    
                    // Отправляем событие победы в Telegram
                    if (tg) {
                        try {
                            tg.sendData(JSON.stringify({
                                event: 'victory',
                                life: Math.floor(life),
                                round: round
                            }));
                        } catch(e) {}
                    }
                    return;
                } else {
                    gamePaused = true;
                    pauseBtn.innerText = '▶️';
                    exampleArea.classList.add('paused');
                    let nextRound = round + 1;
                    let roundNames = ['', 'Первый', 'Второй', 'Третий'];
                    exampleText.innerText = `🎉 ${roundNames[nextRound-1]} раунд успешно пройден! 🎉`;
                    
                    // Отправляем событие завершения раунда в Telegram
                    if (tg) {
                        try {
                            tg.sendData(JSON.stringify({
                                event: 'round_complete',
                                round: round,
                                life: Math.floor(life)
                            }));
                        } catch(e) {}
                    }
                    
                    setTimeout(() => {
                        if (gameActive) {
                            gamePaused = false;
                            pauseBtn.innerText = '⏸️';
                            exampleArea.classList.remove('paused');
                            setupRound(nextRound);
                            phase = 'idle';
                            timeSinceLastExample = 0;
                            nextExampleTime = 1.5;
                            countdownValue = 0;
                            exampleText.innerText = `⏳ Раунд ${nextRound} начинается...`;
                            setTimeout(() => {
                                if (gameActive && !gameCompleted) {
                                    phase = 'idle';
                                    timeSinceLastExample = 0;
                                    nextExampleTime = 1.5;
                                    countdownValue = 0;
                                    exampleText.innerText = '⏳ Ожидание примера...';
                                    lastTimestamp = 0;
                                    deltaAccumulator = 0;
                                }
                            }, 2000);
                        }
                    }, 3000);
                    return;
                }
            }

            phase = 'waiting';
            currentExample = null;
            timeSinceLastExample = 0;
            nextExampleTime = 2.0;
            countdownValue = 0;
            exampleText.innerText = '⏳ Следующий пример через 3...';
        }

        function createBalloonPop(x, y, color) {
            const colors = [color, '#ffffff', '#ffd700', '#ff6b6b', '#ffb8b8'];
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 6;
                const size = 3 + Math.random() * 8;
                particles.push({
                    x: x + (Math.random() - 0.5) * 10,
                    y: y + (Math.random() - 0.5) * 10,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 2,
                    size: size,
                    life: 1.0,
                    decay: 0.01 + Math.random() * 0.02,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    type: 'balloon',
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.2,
                    gravity: 0.08 + Math.random() * 0.08
                });
            }
        }

        function updateLifeDisplay() {
            lifeSpan.innerText = `❤️ ${Math.floor(life)}`;
            if (life <= 0) {
                lifeSpan.innerText = '💀 0';
            }
        }

        function checkBalloonCollisions() {
            const sparrowLeft = 120 - SPARROW_SIZE/2 + 4;
            const sparrowRight = 120 + SPARROW_SIZE/2 - 4;
            const sparrowTop = sparrowY - SPARROW_SIZE/2 + 4;
            const sparrowBottom = sparrowY + SPARROW_SIZE/2 - 4;

            for (let i = balloons.length - 1; i >= 0; i--) {
                const b = balloons[i];
                const bLeft = b.x - b.radius;
                const bRight = b.x + b.radius;
                const bTop = b.y - b.radius;
                const bBottom = b.y + b.radius;

                if (sparrowLeft < bRight && sparrowRight > bLeft &&
                    sparrowTop < bBottom && sparrowBottom > bTop) {
                    handleBalloonCollision(b);
                    return true;
                }
            }
            return false;
        }

        let isTapProcessing = false;

        function handleTap(e) {
            e.preventDefault();
            if (!gameActive || gameCompleted || gamePaused || isTapProcessing) return;

            isTapProcessing = true;
            
            life = Math.max(0, life - 1);
            updateLifeDisplay();
            if (life <= 0) {
                gameActive = false;
                isTapProcessing = false;
                return;
            }
            
            const targetY = sparrowY - JUMP_HEIGHT;
            const clampedTarget = Math.max(15, targetY);
            const distance = sparrowY - clampedTarget;
            let requiredVelocity = -Math.sqrt(2 * currentGravity * distance) * 1.15;
            requiredVelocity = Math.max(requiredVelocity, -8.0);
            velocity = requiredVelocity;

            setTimeout(() => {
                isTapProcessing = false;
            }, 50);
        }

        function drawSky() {
            const gradient = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
            gradient.addColorStop(0, '#4a90d9');
            gradient.addColorStop(0.3, '#87CEEB');
            gradient.addColorStop(0.6, '#b8d8e8');
            gradient.addColorStop(0.8, '#f0d8b0');
            gradient.addColorStop(1, '#f5e6d0');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, GROUND_Y);
        }

        function drawClouds() {
            for (let cloud of clouds) {
                cloud.x += cloud.speed * 0.3;
                if (cloud.x > W + cloud.w) {
                    cloud.x = -cloud.w;
                    cloud.y = 20 + Math.random() * 120;
                }
                
                ctx.save();
                ctx.globalAlpha = cloud.opacity;
                const cx = cloud.x;
                const cy = cloud.y;
                const w = cloud.w;
                const h = cloud.h;
                
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.shadowColor = 'rgba(255, 255, 255, 0.1)';
                ctx.shadowBlur = 20;
                
                const circles = [
                    { dx: 0, dy: 0, r: h * 0.7 },
                    { dx: -w * 0.3, dy: h * 0.1, r: h * 0.6 },
                    { dx: w * 0.3, dy: h * 0.1, r: h * 0.6 },
                    { dx: -w * 0.5, dy: h * 0.3, r: h * 0.4 },
                    { dx: w * 0.5, dy: h * 0.3, r: h * 0.4 },
                    { dx: 0, dy: -h * 0.2, r: h * 0.5 }
                ];
                
                for (let c of circles) {
                    ctx.beginPath();
                    ctx.arc(cx + c.dx, cy + c.dy, c.r, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }

        function drawBalloons() {
            const time = Date.now() / 1000;
            
            for (let b of balloons) {
                b.x -= BALLOON_SPEED;
                b.swingPhase += 0.03;
                const swing = Math.sin(b.swingPhase) * 2;
                
                ctx.save();
                ctx.translate(b.x, b.y + swing);
                
                ctx.strokeStyle = b.color.string;
                ctx.lineWidth = 1.5;
                ctx.setLineDash([3, 5]);
                ctx.beginPath();
                ctx.moveTo(0, b.radius);
                ctx.quadraticCurveTo(8, b.radius + b.stringLength * 0.6, 4, b.radius + b.stringLength);
                ctx.stroke();
                ctx.setLineDash([]);
                
                const grad = ctx.createRadialGradient(-8, -8, 5, 0, 0, b.radius);
                grad.addColorStop(0, b.color.light);
                grad.addColorStop(0.7, b.color.main);
                grad.addColorStop(1, b.color.dark);
                
                ctx.shadowColor = 'rgba(0,0,0,0.2)';
                ctx.shadowBlur = 12;
                
                ctx.beginPath();
                ctx.arc(0, 0, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                ctx.ellipse(-8, -10, 8, 5, -0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                
                ctx.globalAlpha = 0.15;
                ctx.beginPath();
                ctx.ellipse(-4, -6, 4, 3, -0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                
                ctx.globalAlpha = 1.0;
                ctx.shadowBlur = 0;
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 20px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 4;
                ctx.fillText(b.value, 0, 2);
                
                ctx.restore();
            }
        }

        function drawSparrow(x, y) {
            const wingFlap = Math.sin(wingAngle) * 12;
            
            const shadowTargetX = x - 30;
            const shadowTargetY = GROUND_Y - 4;
            const lerpFactor = 0.05;
            shadowX += (shadowTargetX - shadowX) * lerpFactor;
            
            const shadowScale = 1 - (y / GROUND_Y) * 0.5;
            ctx.save();
            ctx.globalAlpha = 0.2 + (1 - y / GROUND_Y) * 0.15;
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.shadowColor = 'rgba(0,0,0,0)';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.ellipse(shadowX, shadowTargetY, 30 * shadowScale, 8 * shadowScale, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            
            ctx.save();
            ctx.translate(x, y);
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.shadowBlur = 8;
            
            ctx.fillStyle = '#8b6b4d';
            ctx.beginPath();
            ctx.ellipse(0, 0, 24, 18, 0, 0, Math.PI*2);
            ctx.fill();
            
            ctx.fillStyle = '#b58a64';
            ctx.beginPath();
            ctx.ellipse(-4, -4, 14, 12, 0, 0, Math.PI*2);
            ctx.fill();
            
            ctx.fillStyle = '#6f523b';
            ctx.beginPath();
            ctx.ellipse(-12, -6, 12, 8, -0.3, 0, Math.PI*2);
            ctx.fill();
            
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.arc(10, -6, 4, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(11, -8, 1.5, 0, Math.PI*2);
            ctx.fill();
            
            ctx.fillStyle = '#d49c3b';
            ctx.beginPath();
            ctx.moveTo(24, -2);
            ctx.lineTo(34, 2);
            ctx.lineTo(24, 6);
            ctx.fill();
            
            ctx.fillStyle = '#5d3f2a';
            ctx.beginPath();
            ctx.moveTo(-24, -2);
            ctx.lineTo(-34, -10 + wingFlap * 0.2);
            ctx.lineTo(-28, 4 + wingFlap * 0.1);
            ctx.fill();
            
            ctx.fillStyle = '#6f523b';
            ctx.shadowBlur = 4;
            ctx.beginPath();
            ctx.ellipse(-8, -12 + wingFlap, 18, 8, -0.2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#8b6b4d';
            ctx.beginPath();
            ctx.ellipse(-4, -10 + wingFlap, 14, 6, -0.1, 0, Math.PI*2);
            ctx.fill();
            
            ctx.fillStyle = '#6f523b';
            ctx.beginPath();
            ctx.ellipse(-4, 12 - wingFlap * 0.7, 16, 7, 0.2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#8b6b4d';
            ctx.beginPath();
            ctx.ellipse(0, 10 - wingFlap * 0.7, 12, 5, 0.1, 0, Math.PI*2);
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.life -= p.decay;
                p.rotation += p.rotSpeed;
                
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.save();
                ctx.globalAlpha = p.life;
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                
                if (p.type === 'balloon') {
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = 'rgba(0,0,0,0.2)';
                    ctx.shadowBlur = 4;
                    const s = p.size;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, s * 0.6, s * 0.8, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = 'rgba(0,0,0,0.2)';
                    ctx.shadowBlur = 4;
                    const s = p.size * 0.5;
                    ctx.beginPath();
                    ctx.ellipse(0, 0, s, s * 0.4, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.restore();
            }
        }

        function drawFlash() {
            if (!flashEffect.active) return;
            
            flashEffect.timer += 0.03;
            flashEffect.alpha = Math.max(0, 1 - flashEffect.timer * 3);
            
            if (flashEffect.alpha <= 0) {
                flashEffect.active = false;
                return;
            }
            
            ctx.save();
            ctx.globalAlpha = flashEffect.alpha * 0.3;
            
            const color = flashEffect.type === 'correct' ? '#00ff00' : '#ff0000';
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 40;
            ctx.fillRect(0, 0, W, H);
            
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            drawSky();
            drawClouds();

            ctx.fillStyle = '#5d8c5a';
            ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y+4);
            ctx.fillStyle = '#7daa6a';
            ctx.fillRect(0, GROUND_Y-4, W, 8);

            drawBalloons();

            const sx = 120, sy = Math.min(sparrowY, GROUND_Y - SPARROW_SIZE/2);
            drawSparrow(sx, sy);

            drawParticles();
            drawFlash();

            if (gameCompleted) {
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fadfbf';
                ctx.font = 'bold 32px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🏆', 200, 160);
                ctx.font = 'bold 24px sans-serif';
                ctx.fillText('Ты настоящий', 200, 220);
                ctx.fillText('Эйнштейн и Джек Воробей!', 200, 260);
                ctx.font = '20px sans-serif';
                ctx.fillText('Нажмите ↺ чтобы начать заново', 200, 340);
            } else if (!gameActive && life <= 0 && gameStarted) {
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fadfbf';
                ctx.font = 'bold 38px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💥', 200, 170);
                ctx.font = 'bold 26px sans-serif';
                ctx.fillText('Воробей погиб!', 200, 250);
                ctx.font = '20px sans-serif';
                ctx.fillText('Нажмите ↺ чтобы начать', 200, 320);
            } else if (!gameActive && sparrowY + SPARROW_SIZE/2 >= GROUND_Y && gameStarted) {
                ctx.fillStyle = 'rgba(0,0,0,0.55)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fadfbf';
                ctx.font = 'bold 38px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💔', 200, 180);
                ctx.font = 'bold 26px sans-serif';
                ctx.fillText('Воробей упал', 200, 260);
                ctx.font = '20px sans-serif';
                ctx.fillText('Нажмите ↺ чтобы начать', 200, 330);
            }
        }

        function update(deltaSec) {
            if (!gameActive || gameCompleted || gamePaused) return;

            wingAngle += deltaSec * 8;

            velocity += currentGravity;
            sparrowY += velocity;

            if (sparrowY + SPARROW_SIZE/2 > GROUND_Y) {
                sparrowY = GROUND_Y - SPARROW_SIZE/2;
                gameActive = false;
                return;
            }
            
            if (sparrowY < 10) {
                sparrowY = 10;
                if (velocity < 0) velocity = 0;
            }

            if (life <= 0) {
                gameActive = false;
                updateLifeDisplay();
                return;
            }

            checkBalloonCollisions();

            for (let i = balloons.length - 1; i >= 0; i--) {
                if (balloons[i].x < -50) {
                    balloons.splice(i, 1);
                }
            }

            if (phase === 'showing' && balloons.length === 0 && currentExample) {
                phase = 'waiting';
                currentExample = null;
                timeSinceLastExample = 0;
                nextExampleTime = 2.0;
                countdownValue = 3;
                exampleText.innerText = '⏳ Следующий пример через 3...';
            }

            if (phase === 'idle') {
                timeSinceLastExample += deltaSec;
                if (timeSinceLastExample >= nextExampleTime) {
                    spawnExample();
                    timeSinceLastExample = 0;
                    nextExampleTime = 999;
                }
            } else if (phase === 'waiting') {
                timeSinceLastExample += deltaSec;
                const remaining = Math.ceil(nextExampleTime - timeSinceLastExample);
                
                if (remaining >= 1 && remaining <= 3) {
                    const newValue = remaining;
                    if (newValue !== countdownValue) {
                        countdownValue = newValue;
                        exampleText.innerText = `⏳ Следующий пример через ${countdownValue}...`;
                    }
                }
                
                if (timeSinceLastExample >= nextExampleTime) {
                    spawnExample();
                    timeSinceLastExample = 0;
                    countdownValue = 0;
                }
            }

            updateLifeDisplay();
        }

        function gameLoop(timestamp) {
            if (!lastTimestamp) {
                lastTimestamp = timestamp;
                requestAnimationFrame(gameLoop);
                return;
            }
            
            let delta = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;
            
            if (delta > 0.1) delta = 0.1;
            if (delta < 0.001) delta = 0.001;
            
            deltaAccumulator += delta;
            
            while (deltaAccumulator >= FIXED_DELTA) {
                update(FIXED_DELTA);
                deltaAccumulator -= FIXED_DELTA;
            }
            
            draw();
            requestAnimationFrame(gameLoop);
        }

        function attachEvents() {
            canvas.addEventListener('pointerdown', function(e) {
                e.preventDefault();
                handleTap(e);
            });
            canvas.addEventListener('contextmenu', e => e.preventDefault());
        }

        restartBtn.addEventListener('click', function(){
            resetGame();
            lastTimestamp = 0;
            deltaAccumulator = 0;
        });

        playBtn.addEventListener('click', function(){
            startGame();
        });

        pauseBtn.addEventListener('click', function(){
            togglePause();
        });

        resetGame();
        attachEvents();
        requestAnimationFrame(gameLoop);
    })();
</script>
